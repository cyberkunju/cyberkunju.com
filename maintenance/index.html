<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#0b0c0e" />
    <title>cyberkunju</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        --bg: #0b0c0e;
        --text: #ededef;
        --muted: #8a8f99;
        --faint: #565b65;
        --line: rgba(255, 255, 255, 0.11);
        --accent: #d8b26a;
        --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
      }
      * { box-sizing: border-box; margin: 0; }
      html, body { height: 100%; }
      body {
        font-family: var(--sans);
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        min-height: 100dvh;
      }

      /* thin poster frame */
      .frame {
        position: fixed;
        inset: clamp(10px, 1.6vw, 20px);
        border: 1px solid var(--line);
        border-radius: 3px;
        pointer-events: none;
        z-index: 1;
      }

      main {
        position: relative;
        z-index: 2;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 2rem;
        padding: clamp(30px, 5.5vw, 64px);
      }

      /* top row */
      .top {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 1rem;
      }
      .brand {
        font-family: inherit;
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.01em;
        color: var(--text);
        background: none; border: 0; padding: 0.2rem 0.1rem;
        cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
      }
      .top .idx {
        font-family: var(--mono);
        font-size: 0.72rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--faint);
      }

      /* hero statement */
      .hero { max-width: 20ch; }
      .hero h1 {
        font-size: clamp(2.9rem, 11vw, 6.5rem);
        font-weight: 620;
        line-height: 0.92;
        letter-spacing: -0.045em;
        text-wrap: balance;
      }
      .hero h1 .dot { color: var(--accent); }
      .hero .sub {
        margin-top: 1.4rem;
        max-width: 42ch;
        color: var(--muted);
        font-size: clamp(0.98rem, 0.9rem + 0.4vw, 1.12rem);
        line-height: 1.55;
      }

      /* spec-sheet footer */
      .meta {
        border-top: 1px solid var(--line);
        padding-top: 1.1rem;
        display: flex;
        flex-wrap: wrap;
        gap: 1.5rem 3rem;
      }
      .meta .field { display: flex; flex-direction: column; gap: 0.35rem; }
      .meta .k {
        font-family: var(--mono);
        font-size: 0.68rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--faint);
      }
      .meta .v { font-size: 0.98rem; color: var(--text); }
      .meta a.v {
        text-decoration: none;
        color: var(--text);
        transition: color 160ms;
      }
      .meta a.v:hover { color: var(--accent); }
      .meta .v.dim { color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="frame" aria-hidden="true"></div>
    <main>
      <div class="top">
        <button class="brand" id="brand" aria-label="cyberkunju" title="cyberkunju">cyberkunju</button>
        <span class="idx">v2 — 2026</span>
      </div>

      <section class="hero">
        <h1>Under&nbsp;maintenance<span class="dot">.</span></h1>
        <p class="sub">A new cyberkunju is being built — considered, not rushed. Back before long.</p>
      </section>

      <footer class="meta">
        <div class="field">
          <span class="k">Status</span>
          <span class="v dim">Rebuilding</span>
        </div>
        <div class="field">
          <span class="k">By</span>
          <span class="v">Navaneeth&nbsp;K</span>
        </div>
        <div class="field">
          <span class="k">Contact</span>
          <a class="v" href="mailto:hi@cyberkunju.com">hi@cyberkunju.com</a>
        </div>
      </footer>
    </main>

    <style>
      .gate {
        position: fixed; inset: 0; z-index: 30;
        display: grid; place-items: center;
        background: color-mix(in oklab, #050506 78%, transparent);
        backdrop-filter: blur(8px);
        opacity: 0; visibility: hidden;
        transition: opacity 200ms ease, visibility 200ms;
      }
      .gate[data-open="true"] { opacity: 1; visibility: visible; }
      .gate__card {
        width: min(90vw, 22rem);
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 1.9rem 1.6rem;
        text-align: left;
      }
      .gate__title {
        font-family: var(--mono);
        font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
        color: var(--faint);
      }
      .gate__hint { color: var(--muted); font-size: 0.9rem; margin-top: 0.5rem; }
      .pin { display: flex; gap: 0.55rem; margin: 1.5rem 0 0.3rem; }
      .pin input {
        width: 100%; height: 3rem; min-width: 0;
        text-align: center;
        font-family: var(--mono); font-size: 1.3rem; color: var(--text);
        background: transparent;
        border: 0; border-bottom: 1px solid var(--line);
        outline: none;
        transition: border-color 140ms;
        -webkit-text-security: disc; text-security: disc;
      }
      .pin input:focus { border-bottom-color: var(--accent); }
      .gate__error {
        font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
        color: #e8746a; min-height: 1rem; margin-top: 0.8rem;
      }
      .gate.shake .gate__card { animation: shake 0.4s cubic-bezier(0.36,0.07,0.19,0.97); }
      @keyframes shake {
        10%,90% { transform: translateX(-2px); } 20%,80% { transform: translateX(3px); }
        30%,50%,70% { transform: translateX(-6px); } 40%,60% { transform: translateX(6px); }
      }
      @media (prefers-reduced-motion: reduce) {
        .gate { transition: none; }
        .gate.shake .gate__card { animation: none; }
      }
    </style>

    <div class="gate" id="gate" role="dialog" aria-modal="true" aria-label="Access" aria-hidden="true">
      <div class="gate__card">
        <div class="gate__title">Access</div>
        <div class="gate__hint">Enter PIN. This device stays unlocked.</div>
        <div class="pin" id="pin">
          <input inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 1" />
          <input inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 2" />
          <input inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 3" />
          <input inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 4" />
          <input inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 5" />
          <input inputmode="numeric" maxlength="1" autocomplete="off" aria-label="Digit 6" />
        </div>
        <div class="gate__error" id="err" role="alert"></div>
      </div>
    </div>

    <script>
      (() => {
        const brand = document.getElementById('brand');
        const gate = document.getElementById('gate');
        const err = document.getElementById('err');
        const inputs = Array.from(document.querySelectorAll('#pin input'));

        let taps = 0, tapTimer = null;
        brand.addEventListener('click', () => {
          taps += 1;
          clearTimeout(tapTimer);
          tapTimer = setTimeout(() => { taps = 0; }, 1200);
          if (taps >= 3) { taps = 0; openGate(); }
        });

        function openGate() {
          gate.dataset.open = 'true';
          gate.setAttribute('aria-hidden', 'false');
          err.textContent = '';
          inputs.forEach((i) => (i.value = ''));
          setTimeout(() => inputs[0].focus(), 60);
        }
        function closeGate() {
          gate.dataset.open = 'false';
          gate.setAttribute('aria-hidden', 'true');
        }

        gate.addEventListener('click', (e) => { if (e.target === gate) closeGate(); });
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && gate.dataset.open === 'true') closeGate();
        });

        inputs.forEach((input, idx) => {
          input.addEventListener('input', () => {
            input.value = input.value.replace(/\D/g, '').slice(0, 1);
            if (input.value && idx < inputs.length - 1) inputs[idx + 1].focus();
            if (inputs.every((i) => i.value)) submit();
          });
          input.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && !input.value && idx > 0) inputs[idx - 1].focus();
          });
          input.addEventListener('paste', (e) => {
            e.preventDefault();
            const digits = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 6);
            digits.split('').forEach((d, i) => { if (inputs[i]) inputs[i].value = d; });
            if (digits.length) inputs[Math.min(digits.length, 5)].focus();
            if (inputs.every((i) => i.value)) submit();
          });
        });

        let busy = false;
        async function submit() {
          if (busy) return;
          busy = true;
          const pin = inputs.map((i) => i.value).join('');
          try {
            const res = await fetch('/__unlock/' + encodeURIComponent(pin), { method: 'GET', cache: 'no-store' });
            if (res.status === 204) { location.replace('/'); return; }
            fail();
          } catch { fail(); }
          busy = false;
        }
        function fail() {
          err.textContent = 'Incorrect PIN';
          gate.classList.remove('shake');
          void gate.offsetWidth;
          gate.classList.add('shake');
          inputs.forEach((i) => (i.value = ''));
          inputs[0].focus();
        }
      })();
    </script>
  </body>
</html>
