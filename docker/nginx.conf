# In-container nginx: serves the static Astro output on 8080.
# TLS, HTTP/3, compression, and edge caching are handled by Cloudflare + the
# host reverse-proxy in front of this container, so this stays lean.

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't leak the nginx version.
    server_tokens off;

    # Content-hashed, immutable build assets — cache hard.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The service worker must always revalidate so updates ship promptly.
    location = /sw.js {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri =404;
    }

    # Clean routing for Astro's directory-style static output.
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    error_page 404 /404.html;

    # Origin-side gzip (Cloudflare adds Brotli at the edge).
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain application/manifest+json;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
