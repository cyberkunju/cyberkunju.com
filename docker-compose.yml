# Portfolio — static site container, fronted by the host nginx reverse proxy.
# Published on localhost only; the host vhost for www.cyberkunju.com proxies here.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: portfolio:latest
    container_name: portfolio
    restart: unless-stopped

    # Localhost-only publish. Host nginx proxies www.cyberkunju.com -> here.
    ports:
      - "127.0.0.1:8092:8080"

    # Maintenance-gate secrets come from a server-only .env (never committed).
    # Only GATE_* vars are substituted into the nginx template.
    env_file:
      - .env
    environment:
      NGINX_ENVSUBST_FILTER: "^GATE_"

    # Hardening: non-root image, no privilege escalation.
    # (read-only rootfs is omitted because the entrypoint renders the config
    # template into /etc/nginx/conf.d at startup.)
    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.50"
